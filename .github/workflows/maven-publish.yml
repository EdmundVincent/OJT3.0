name: Maven Package

on:
  push:
    branches:
    - main

      - 'release/*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file ./common/pom.xml

      - name: Publish to GitHub Packages
        run: mvn -B deploy --file ./common/pom.xml -s $GITHUB_WORKSPACE/common/settings.xml
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_ACTOR: ${{ github.actor }}
